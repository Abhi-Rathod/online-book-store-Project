apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-store
  labels:
    app: book-store

spec:
  replicas: 4

  selector:
    matchLabels:
      app: book-store

  template:
    metadata:
      labels:
        app: book-store

    spec:
      containers:
      - name: book-store
        image: abhishek0259/book-store:latest
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: book-store-service

spec:
  type: NodePort

  selector:
    app: book-store

  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30007
